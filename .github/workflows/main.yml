name: StanBlackJack CI/CD

on:
  push:
    branches: [ main, develop, staging ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter test

  build_web:
    needs: run_tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - name: Build Web (Dev)
        if: github.ref == 'refs/heads/develop'
        run: flutter build web --release --dart-define=ENVIRONMENT=dev

      - name: Build Web (Staging)
        if: github.ref == 'refs/heads/staging'
        run: flutter build web --release --dart-define=ENVIRONMENT=stg

      - name: Build Web (Production)
        if: github.ref == 'refs/heads/main'
        run: flutter build web --release --dart-define=ENVIRONMENT=prod

      - name: Deploy to Firebase Hosting (Dev)
        if: github.ref == 'refs/heads/develop'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_STANBLACKJACK_DEV }}'
          projectId: stanblackjack-dev
          channelId: live

      - name: Deploy to Firebase Hosting (Staging)
        if: github.ref == 'refs/heads/staging'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_STANBLACKJACK_STG }}'
          projectId: stanblackjack-stg
          channelId: live

      - name: Deploy to Firebase Hosting (Production)
        if: github.ref == 'refs/heads/main'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_STANBLACKJACK_PROD }}'
          projectId: stanblackjack-prod
          channelId: live

  build_android:
    needs: run_tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  health_check:
    needs: build_web
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: |
          cd test_health
          npm install
          npx playwright install --with-deps chromium

      - name: Run Dev Health Check
        if: github.ref == 'refs/heads/develop'
        run: |
          cd test_health
          TEST_URL=https://stanblackjack-dev.web.app npm test

      - name: Run Staging Health Check
        if: github.ref == 'refs/heads/staging'
        run: |
          cd test_health
          TEST_URL=https://stanblackjack-stg.web.app npm test

      - name: Run Production Health Check
        if: github.ref == 'refs/heads/main'
        run: |
          cd test_health
          TEST_URL=https://stanblackjack-prod.web.app npm test
