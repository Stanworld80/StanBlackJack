name: StanBlackJack CI/CD

on:
  push:
    branches: [ main, develop, staging ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter test

  deploy_dev:
    needs: run_tests
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - name: Build Web (Dev) - No Minify for Debugging
        run: flutter build web --release --no-minify --dart-define=ENVIRONMENT=dev
      - name: Deploy to Firebase Hosting (Dev)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_STANBLACKJACK_DEV }}'
          projectId: stanblackjack-dev
          channelId: live

  health_check_dev:
    needs: deploy_dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: |
          cd test_health
          npm install
          npx playwright install --with-deps chromium
      - name: Run Dev Health Check
        run: |
          cd test_health
          TEST_URL=https://stanblackjack-dev.web.app npm test

  deploy_stg:
    needs: run_tests
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - name: Build Web (Staging)
        run: flutter build web --release --dart-define=ENVIRONMENT=stg
      - name: Deploy to Firebase Hosting (Staging)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_STANBLACKJACK_STG }}'
          projectId: stanblackjack-stg
          channelId: live

  health_check_stg:
    needs: deploy_stg
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: |
          cd test_health
          npm install
          npx playwright install --with-deps chromium
      - name: Run Staging Health Check
        run: |
          cd test_health
          TEST_URL=https://stanblackjack-stg.web.app npm test

  deploy_prod:
    needs: run_tests
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - name: Build Web (Production)
        run: flutter build web --release --dart-define=ENVIRONMENT=prod
      - name: Deploy to Firebase Hosting (Production)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_STANBLACKJACK_PROD }}'
          projectId: stanblackjack-prod
          channelId: live

  health_check_prod:
    needs: deploy_prod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: |
          cd test_health
          npm install
          npx playwright install --with-deps chromium
      - name: Run Production Health Check
        run: |
          cd test_health
          TEST_URL=https://stanblackjack-prod.web.app npm test

  build_android:
    needs: run_tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

